schema_version: 1
pack_id: tokio_async
namespace: public
language_id: rust
source_kind: project_policy
description: Tokio async review rules for blocking work, spawn ownership, and queue backpressure.
default_enabled: true
default_priority_tier: high
entries:
  - rule_no: RUST.TOKIO.1
    section: RUSTTOKIO
    title: Blocking std or reqwest::blocking calls should not run inside Tokio async paths
    summary: Async Rust only stays scalable when blocking work does not quietly occupy executor threads.
    text: A blocking file, network, or process call inside an async function can starve unrelated tasks and hide latency spikes that are hard to connect back to the local diff.
    category: performance
    trigger_patterns: [tokio_blocking_in_async]
    fix_guidance: Use async-native APIs or move the blocking work behind spawn_blocking or another explicit off-thread boundary.
    base_score: 0.96
    severity_default: 0.97
    priority_tier: high
    specificity: 0.94
    false_positive_risk: low
  - rule_no: RUST.TOKIO.2
    section: RUSTTOKIO
    title: Detached tokio::spawn calls should make join, cancellation, and error ownership explicit
    summary: Spawned work is safe only when someone still owns its failure and shutdown contract.
    text: A bare tokio::spawn often means the task lifecycle moved out of the local function without a visible owner. Review whether the caller still knows who joins, cancels, or logs task failure.
    category: error_handling
    trigger_patterns: [tokio_detached_spawn]
    fix_guidance: Keep a JoinHandle when the caller needs ownership, or wrap detached background work in a named component that documents shutdown and error routing.
    base_score: 0.84
    severity_default: 0.86
    priority_tier: high
    specificity: 0.82
    false_positive_risk: medium
  - rule_no: RUST.TOKIO.3
    section: RUSTTOKIO
    title: Unbounded Tokio channels should have an explicit backpressure story
    summary: Unbounded queues turn transient bursts into memory growth unless the producer-consumer contract is very explicit.
    text: A convenient unbounded channel can quietly move overload risk from latency to memory growth. Review whether the system really intends to absorb arbitrary queue depth.
    category: performance
    trigger_patterns: [tokio_unbounded_channel]
    fix_guidance: Prefer bounded channels or document why unbounded growth is acceptable and how it is observed operationally.
    base_score: 0.88
    severity_default: 0.9
    priority_tier: high
    specificity: 0.86
    false_positive_risk: medium
  - rule_no: RUST.TOKIO.REF.1
    section: RUSTTOKIOREF
    title: Tokio cancellation and select-loop ownership should stay obvious at async boundaries
    summary: Reference guidance is useful when the patch hints at task-lifecycle ambiguity but does not prove one concrete bug.
    text: Prefer async code where cancellation, shutdown, and select-loop exit conditions are close enough to the task boundary that reviewers can reason about them locally.
    category: process
    reviewability: reference_only
    applies_to: [code, diff, docs]
    false_positive_risk: medium
    base_score: 0.55
    severity_default: 0.55
  - rule_no: RUST.TOKIO.REF.2
    section: RUSTTOKIOREF
    title: Tokio tests should avoid sleep-driven timing assumptions when deterministic coordination is available
    summary: Time-based async tests are often more advisory than inline-defect evidence.
    text: Prefer channels, notifications, or deterministic clocks over arbitrary sleep intervals so test intent remains stable across machines and scheduler behavior.
    category: process
    reviewability: reference_only
    applies_to: [code, diff, docs]
    false_positive_risk: medium
    base_score: 0.54
    severity_default: 0.54
