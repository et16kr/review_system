schema_version: 1
pack_id: ansi_sql
namespace: public
language_id: sql
source_kind: public_standard
description: Baseline SQL correctness and safety rules.
default_enabled: true
default_priority_tier: high
entries:
  - rule_no: SQL.1
    section: SQL
    title: Avoid SELECT * in persisted or shared query paths
    summary: Stable queries should declare the columns they actually depend on.
    text: SELECT * weakens schema compatibility, obscures contract intent, and often pulls more data than the caller needs.
    category: sql_quality
    trigger_patterns: [select_star]
    fix_guidance: Enumerate the required columns explicitly and keep that list close to the consumer contract.
    base_score: 0.86
    severity_default: 0.88
    priority_tier: high
    specificity: 0.84
    false_positive_risk: medium
  - rule_no: SQL.2
    section: SQL
    title: Prefer explicit JOIN syntax over comma joins
    summary: Explicit joins keep relational intent and join predicates easier to review.
    text: Comma joins make it easier to miss a predicate and harder to see which relationship the query is meant to express.
    category: sql_quality
    trigger_patterns: [implicit_join]
    fix_guidance: Use explicit JOIN clauses and keep join predicates near the relationship they justify.
    base_score: 0.9
    severity_default: 0.92
    priority_tier: high
    specificity: 0.88
    false_positive_risk: low
  - rule_no: SQL.3
    section: SQL
    title: Keep join predicates adjacent to the relationship they justify
    summary: Query intent stays clearer when the relational contract is visible at the join boundary.
    text: Explicit join syntax is most helpful when each ON clause sits next to the table relationship it defines instead of scattering predicate logic through later filters.
    category: sql_quality
    trigger_patterns: [implicit_join]
    fix_guidance: Convert comma joins to explicit JOIN clauses and place each join predicate next to the relationship it constrains.
    base_score: 0.88
    severity_default: 0.9
    priority_tier: high
    specificity: 0.86
    false_positive_risk: low
  - rule_no: SQL.4
    section: SQL
    title: Stable query contracts should project only the columns they need
    summary: Wide result sets hide coupling and make schema evolution more fragile.
    text: Explicit column lists keep application assumptions reviewable and reduce the chance that unrelated schema changes alter performance or downstream behavior.
    category: sql_quality
    trigger_patterns: [select_star]
    fix_guidance: Enumerate the required columns and keep the list aligned with the consuming contract.
    base_score: 0.85
    severity_default: 0.87
    priority_tier: high
    specificity: 0.83
    false_positive_risk: medium
  - rule_no: SQL.5
    section: SQL
    title: Avoid ordinal ORDER BY in shared queries
    summary: Positional sorts are harder to review and drift silently when the select list changes.
    text: "`ORDER BY 1` or similar forms compress the query text at the cost of making sorting behavior less explicit to reviewers and maintainers."
    category: sql_quality
    trigger_patterns: [order_by_ordinal]
    fix_guidance: Sort by the explicit column or alias name so query intent remains stable if the projection changes.
    base_score: 0.78
    severity_default: 0.8
    priority_tier: default
    specificity: 0.76
    false_positive_risk: medium
  - rule_no: SQL.6
    section: SQL
    title: Review NOT IN subqueries carefully for NULL semantics
    summary: NOT IN behaves differently from many readers expect when the subquery can produce NULL.
    text: "Queries that use `NOT IN (SELECT ...)` can exclude more rows than intended when NULL participates in the comparison set."
    category: sql_quality
    trigger_patterns: [not_in_subquery]
    fix_guidance: Prefer `NOT EXISTS` or add an explicit NULL-handling strategy when the subquery result can contain NULLs.
    base_score: 0.86
    severity_default: 0.88
    priority_tier: high
    specificity: 0.84
    false_positive_risk: medium
  - rule_no: SQL.REF.1
    section: SQLREF
    title: Shared paging and reporting queries should document their stable ordering contract
    summary: Query review is safer when sort ownership is explicit instead of implied by the current projection shape.
    text: Use this as reference guidance when a query appears to depend on result ordering, page boundaries, or report stability but the surrounding product contract is not fully visible in the patch.
    category: sql_quality
    reviewability: reference_only
    applies_to: [code, diff, docs]
    false_positive_risk: medium
    base_score: 0.55
    severity_default: 0.55
