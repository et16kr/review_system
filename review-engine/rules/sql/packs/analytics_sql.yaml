schema_version: 1
pack_id: analytics_sql
namespace: public
language_id: sql
source_kind: public_standard
description: Analytics warehouse SQL guidance for result stability and model clarity.
default_enabled: true
default_priority_tier: high
context_id: analytics
entries:
  - rule_no: SQL.WH.1
    section: SQLWH
    title: Avoid ordinal GROUP BY in committed warehouse and reporting queries
    summary: Positional grouping is terse, but it makes long-lived analytical queries harder to evolve safely.
    text: Warehouse queries often become shared model or reporting contracts. Ordinal grouping weakens reviewability because projection edits can silently change grouping semantics.
    category: sql_quality
    trigger_patterns: [group_by_ordinal]
    fix_guidance: Group by explicit column names or aliases so the grouping contract remains stable as the projection evolves.
    base_score: 0.85
    severity_default: 0.87
    priority_tier: high
    specificity: 0.83
    false_positive_risk: medium
  - rule_no: SQL.WH.2
    section: SQLWH
    title: Committed warehouse queries that use LIMIT should keep ordering explicit
    summary: LIMIT without ORDER BY is often unstable in reporting and warehouse review paths.
    text: Sampling and report SQL can look deterministic in code review even when the database may return rows in an arbitrary order. When the query result is meant to be reused or inspected, ordering should be explicit.
    category: sql_quality
    trigger_patterns: [limit_without_order]
    fix_guidance: Add an explicit ORDER BY that matches the intended report or sampling contract before applying LIMIT.
    base_score: 0.88
    severity_default: 0.9
    priority_tier: high
    specificity: 0.86
    false_positive_risk: medium
  - rule_no: SQL.WH.REF.1
    section: SQLWHREF
    title: Warehouse models should make UNION versus UNION ALL intent explicit
    summary: Deduplication cost and semantics should be visible where shared warehouse models combine result sets.
    text: Use this as reference guidance when analytical SQL combines sources with UNION semantics but the surrounding model contract is needed to decide whether deduplication is intentional or accidental.
    category: sql_quality
    reviewability: reference_only
    applies_to: [code, diff, docs]
    false_positive_risk: medium
    base_score: 0.55
    severity_default: 0.55
  - rule_no: SQL.WH.REF.2
    section: SQLWHREF
    title: Incremental and partitioned warehouse models should keep freshness filters obvious
    summary: Model review is safer when the freshness and backfill boundary is visible in the query itself or an adjacent helper.
    text: Prefer explicit date, partition, or watermark boundaries in committed warehouse models so later reviewers do not have to reconstruct which rows are meant to be refreshed.
    category: sql_quality
    reviewability: reference_only
    applies_to: [code, diff, docs]
    false_positive_risk: medium
    base_score: 0.54
    severity_default: 0.54
